<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giấy Triệu Tập Tốt Nghiệp</title>
    <style>
        /* --- GIAO DIỆN CHUNG --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 30px 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        /* Hiệu ứng chấm bi mờ ảo ở 2 bên cánh */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.03) 15%, transparent 15%);
            background-size: 15px 15px;
            pointer-events: none;
        }

        /* --- QUỐC HIỆU & TIÊU ĐỀ --- */
        .header-grid {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: bold;
            line-height: 1.5;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .header-left { text-align: left; width: 45%; }
        .header-right { text-align: right; width: 50%; }
        .line-decoration {
            width: 60%;
            height: 1px;
            background: #e0e0e0;
            margin: 4px auto 0;
        }
        
        .sub-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 20px;
            color: #aaa;
        }
        .hoa-toc {
            color: #ff3333;
            font-weight: 900;
            font-size: 22px;
            font-style: italic;
            text-shadow: 0 0 10px rgba(255,51,51,0.6);
            transform: rotate(-10deg);
            display: inline-block;
        }

        /* --- HIỆU ỨNG CHỮ NEON ĐỎ --- */
        .main-title {
            font-size: 38px;
            font-weight: 900;
            color: #ff3b30;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.8), 0 0 20px rgba(255, 59, 48, 0.4);
            margin-top: 10px;
        }
        .sub-title {
            font-style: italic;
            font-size: 13px;
            color: #888;
            margin-bottom: 35px;
        }

        /* --- TRANG 1: MÀN HÌNH NHẬP TÊN --- */
        .screen { display: none; position: relative; z-index: 1; }
        .screen.active { display: block; }

        .form-group {
            margin-top: 40px;
            text-align: left;
        }
        .form-label {
            color: #ff3b30;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 10px;
            display: block;
        }
        .form-label-icon { margin-right: 5px; }
        
        .input-field {
            width: 100%;
            padding: 14px;
            background: #262626;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-field:focus {
            border-color: #ff3b30;
            box-shadow: 0 0 8px rgba(255, 59, 48, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
            transition: 0.2s;
        }
        .btn-submit:hover {
            background: #ff453a;
            transform: translateY(-1px);
        }
        .btn-submit:active {
            transform: translateY(1px);
        }

        /* --- TRANG 2: NỘI DUNG THƯ MỜI --- */
        .content-block {
            text-align: left;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }
        .content-block p {
            margin-bottom: 12px;
        }
        .highlight-text {
            color: #ff453a;
            font-weight: bold;
        }
        .visitor-name {
            color: #ff453a;
            font-weight: bold;
            font-size: 16px;
            text-decoration: underline;
        }
        
        .section-title {
            color: #ff3b30;
            font-weight: bold;
            font-size: 14px;
            margin: 20px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .content-list {
            list-style: none;
            padding-left: 5px;
        }
        .content-list li {
            position: relative;
            padding-left: 15px;
            margin-bottom: 6px;
        }
        .content-list li::before {
            content: "•";
            color: #ff3b30;
            position: absolute;
            left: 0;
        }
        
        .footer-sign {
            margin-top: 40px;
            text-align: right;
            font-style: italic;
            font-size: 13px;
            color: #aaa;
        }

        @media (max-width: 400px) {
            .header-grid { font-size: 8px; }
            .main-title { font-size: 28px; }
            .hoa-toc { font-size: 18px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="sflw.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="header-grid">
            <div class="header-left">
                TRƯỜNG ĐẠI HỌC CÔNG NGHỆ<br>GIAO THÔNG VẬN TẢI
                <div class="line-decoration"></div>
            </div>
            <div class="header-right">
                CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM<br>Độc lập - Tự do - Hạnh phúc
                <div class="line-decoration"></div>
            </div>
        </div>

        <div class="sub-info">
            <div>Số: ...........................</div>
            <div class="hoa-toc">⚡ HỎA TỐC</div>
        </div>

        <div style="text-align: right; font-size: 11
